name: Release Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Compile Windows Binary
      run: npm run build

    - name: Compile Inno Setup Installer
      # The windows-latest runner comes with Inno Setup Compiler (iscc) pre-installed!
      run: iscc installer.iss

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/CodexAntigravityBridgeSetup.exe
          dist/codex-antigravity-bridge.exe
          dist/bridge-tray.exe
